services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "roadpass_development"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: bash -c "until nc -z db 5432; do sleep 1; done; rm -f tmp/pids/server.pid && bundle exec rails s -b 0.0.0.0"
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgres://postgres:password@db:5432/roadpass_development
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY_BASE=2a9039a8d38aecc0bac9f4469f6c57b3f978d0a695caab9898fb3cf3bd3506e6bae4c908b484aa907490149b9b70c9d1129882883a80f389c3c1e91791cea660

  sidekiq:
    build: .
    command: bash -c "until nc -z db 5432; do sleep 1; done; bundle exec sidekiq"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
      - redis
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgres://postgres:password@db:5432/roadpass_development
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY_BASE=2a9039a8d38aecc0bac9f4469f6c57b3f978d0a695caab9898fb3cf3bd3506e6bae4c908b484aa907490149b9b70c9d1129882883a80f389c3c1e91791cea660

volumes:
  db_data: